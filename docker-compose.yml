services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parcial_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/parcial_db
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  admin-frontend:
    build: ./frontend/admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/admin/src:/app/src
    depends_on:
      - backend

  store-frontend:
    build: ./frontend/store
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/store/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
